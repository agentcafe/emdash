                        - heading "Notes on Simplicity" [level=1] [ref=e31]
                        - paragraph [ref=e32]: Simplicity isn't the absence of complexity. It's the result of understanding a problem well enough to solve it cleanly.
                    - generic [ref=e33]:
                        - paragraph [ref=e34]: Every piece of software starts simple. A few files, a clear purpose, a small surface area. Then features get added, edge cases get handled, and before long you're looking at something that requires a diagram to understand. This isn't inevitable, but it takes discipline to prevent.
                        - paragraph [ref=e35]: The hard part of simplicity isn't the initial design. It's the ongoing resistance to complication. Every feature request, every bug fix, every refactor is an opportunity to add complexity. Saying no is the most important design skill, and the least celebrated.
                        - heading "Removing as a feature" [level=2] [ref=e36]
                        - paragraph [ref=e37]: The best version of a product often has fewer features than the previous one. Not because features were missing, but because someone had the courage to remove things that weren't earning their keep. Every feature has a cost - in maintenance, in cognitive load, in the weight of the interface.
                        - paragraph [ref=e38]: "Simplicity is a practice, not a destination. You never arrive at simple. You just keep asking: is this necessary? Could this be clearer? Is there a way to solve this problem by removing something instead of adding something? The answer is yes more often than you'd expect."

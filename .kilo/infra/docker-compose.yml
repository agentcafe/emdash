# OpenViking context database — development infrastructure
# Usage: docker compose -f .kilo/infra/docker-compose.yml up -d
#
# Requires:
#   - ~/.openviking/ov.conf (with root_api_key, embedding config)
#   - ~/.openviking/data/ (persistent storage bind mount destination)
#   - host.docker.internal resolution for embedding pipeline (litellm on host)
#
# Docker Desktop for Mac: --add-host is handled by extra_hosts below
# Linux: host.docker.internal should resolve natively

services:
  openviking:
    image: ghcr.io/volcengine/openviking:latest
    container_name: openviking
    ports:
      - "1933:1933"
      - "8020:8020"
    volumes:
      - ~/.openviking/ov.conf:/app/ov.conf
      - ~/.openviking/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENVIKING_WITH_BOT: "0"
    restart: unless-stopped
